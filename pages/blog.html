<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = { apiKey:"YOUR_API_KEY",authDomain:"YOUR_PROJECT.firebaseapp.com",projectId:"YOUR_PROJECT_ID",storageBucket:"YOUR_PROJECT.appspot.com",messagingSenderId:"YOUR_SENDER_ID",appId:"YOUR_APP_ID" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;
  window._firestoreLib = { collection, query, orderBy, getDocs };
  initBlogPage();
</script>
<script src="../js/main.js"></script>
<script>
const POSTS_PER_PAGE = 9;
let blogPosts = [], blogPage = 1, blogCat = 'all', blogSearch = '';

// Read URL cat param
const urlCat = new URLSearchParams(location.search).get('cat');
if (urlCat) {
  blogCat = urlCat;
  document.querySelectorAll('.cat-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.cat === urlCat);
  });
}

async function initBlogPage() {
  try {
    const db = window._db;
    const { collection, query, orderBy, getDocs } = window._firestoreLib;
    if (!db) { blogPosts = generateDemoPosts(); renderBlog(); return; }
    const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    blogPosts = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.status !== 'draft');
    renderBlog();
  } catch(e) {
    blogPosts = generateDemoPosts();
    renderBlog();
  }
}

function renderBlog() {
  const filtered = blogPosts.filter(p => {
    const cm = blogCat === 'all' || p.category === blogCat;
    const sm = !blogSearch || p.title.toLowerCase().includes(blogSearch.toLowerCase());
    return cm && sm;
  });
  const totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE);
  const slice = filtered.slice((blogPage - 1) * POSTS_PER_PAGE, blogPage * POSTS_PER_PAGE);
  const grid = document.getElementById('blogGrid');
  grid.innerHTML = slice.length
    ? slice.map(p => buildPostCard(p)).join('')
    : `<div class="no-posts" style="grid-column:span 3"><h3>No posts found</h3><p>Try a different search or category.</p></div>`;

  // Pagination
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement('button');
    btn.className = `page-btn ${i === blogPage ? 'active' : ''}`;
    btn.textContent = i;
    btn.onclick = () => { blogPage = i; renderBlog(); window.scrollTo(0, 0); };
    pag.appendChild(btn);
  }
}

document.querySelectorAll('.cat-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    blogCat = pill.dataset.cat;
    blogPage = 1;
    renderBlog();
  });
});

document.getElementById('searchInput')?.addEventListener('input', e => {
  blogSearch = e.target.value;
  blogPage = 1;
  renderBlog();
});

function buildPostCard(post) {
  const img = post.imageUrl || `https://picsum.photos/seed/${post.id}/640/360`;
  const date = post.createdAt?.toDate ? post.createdAt.toDate().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) : '';
  const initials = (post.author||'FR').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  return `<div class="post-card" onclick="window.location='post.html?id=${post.id}'">
    <div class="post-thumb" style="height:220px">
      <img src="${img}" alt="${post.title}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${post.id}/640/360'"/>
      <div class="play-btn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div>
    </div>
    <div class="post-body">
      <div class="post-meta"><span class="post-cat">${post.category||'Blog'}</span><span class="post-date">${date}</span></div>
      <h3 class="post-title">${post.title}</h3>
      <div class="post-author"><div class="author-av">${initials}</div><span class="author-name">${post.author||'FrameRate'}</span></div>
    </div>
  </div>`;
}
</script>
